backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
glx-no-rebind-pixmap = true;
use-damage = true;
xrender-sync-fence = true;
refresh-rate = 0;
vsync = true;

mark-wmwin-focused = true;

mark-ovredir-focused = true;

use-ewmh-active-win = true;

shadow = true;

shadow-radius = 5;

shadow-offset-x = -5;

shadow-offset-y = -5;

shadow-opacity = 0.5;

shadow-exclude = [
    "! name~=''",
    "name = 'Notification'",
    "name = 'Plank'",
    "name = 'Docky'",
    "name = 'Kupfer'",
    "name = 'xfce4-notifyd'",
    "name *= 'VLC'",
    "name *= 'compton'",
    "name *= 'Chromium'",
    "name *= 'Chrome'",
    "class_g = 'Firefox' && argb",
    "class_g = 'Conky'",
    "class_g = 'Kupfer'",
    "class_g = 'Synapse'",
    "class_g ?= 'Notify-osd'",
    "class_g ?= 'Cairo-dock'",
    "class_g = 'Cairo-clock'",
    "class_g ?= 'Xfce4-notifyd'",
    "class_g ?= 'Xfce4-power-manager'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "!focused", "class_g = 'dmenu'"
];

shadow-ignore-shaped = false;

fading = true;

fade-delta = 4;

fade-in-step = 0.03;

fade-out-step = 0.03;

no-fading-openclose = true;

fade-exclude = [ ];

active-opacity = 1;

inactive-opacity = 0.80;

frame-opacity = 1;

inactive-opacity-override = false;

opacity-rule = [
"95:class_g = 'Xfce4-terminal' && _NET_WM_STATE@:32a",
"65:class_g = 'Xfce4-terminal' && !_NET_WM_STATE@:32a",
"0:_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

blur-background = true;

blur-background-frame = true;

blur-background-fixed = false;

blur-kern = "3x3box";

blur-background-exclude = [
"window_type = 'dock'",
"window_type = 'desktop'",
"_GTK_FRAME_EXTENTS@:c"
];

unredir-if-possible = false;

focus-exclude = [ ];

detect-rounded-corners = true;

detect-client-opacity = true;

detect-transient = true;

detect-client-leader = true;

wintypes:
{
tooltip = { opacity = 0.9; shadow = false; fade = true; focus = true; };
dock = { shadow = false; }
dropdown_menu = { opacity = 0.9; shadow = false; fade = true; focus = true; };
popup_menu = { opacity = 0.95; shadow = false; fade = true; focus = true; };
dnd = { shadow = false; };
};